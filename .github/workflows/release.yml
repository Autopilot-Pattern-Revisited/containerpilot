name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  docker-image:
    name: Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image metadata
        id: image
        run: |
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          echo "name=${image}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-platform image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.image.outputs.name }}:${{ steps.image.outputs.tag }}

  release-binaries:
    name: Release Binaries
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build release binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist release
          git_hash="$(git rev-parse --short HEAD)"
          ldflags="-X github.com/Autopilot-Pattern-Revisited/containerpilot/version.GitHash=${git_hash} -X github.com/Autopilot-Pattern-Revisited/containerpilot/version.Version=${VERSION}"

          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            goos="${target%/*}"
            goarch="${target#*/}"
            outdir="dist/containerpilot-${VERSION}-${goos}-${goarch}"
            mkdir -p "${outdir}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -o "${outdir}/containerpilot" -ldflags "${ldflags}"
            tar -C "${outdir}" -czf "release/containerpilot-${VERSION}-${goos}-${goarch}.tar.gz" containerpilot
          done

          cd release
          sha256sum *.tar.gz > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: "ContainerPilot ${{ github.ref_name }}"
          files: release/*
