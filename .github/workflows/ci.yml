name: CI

on:
  pull_request:
  push:
    branches:
      - "**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: $(go env GOPATH)/bin/staticcheck ./...

      - name: Run go vet
        run: go vet ./...

  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Consul
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y unzip

          CONSUL_VERSION="$(curl --fail -Ls https://releases.hashicorp.com/consul/ \
            | grep -Eo 'consul/[0-9]+\.[0-9]+\.[0-9]+/' \
            | cut -d/ -f2 \
            | sort -V \
            | tail -n1)"
          test -n "${CONSUL_VERSION}"

          archive="consul_${CONSUL_VERSION}_linux_amd64.zip"
          curl --fail -Lso "/tmp/${archive}" "https://releases.hashicorp.com/consul/${CONSUL_VERSION}/${archive}"
          curl --fail -Lso "/tmp/consul_SHA256SUMS" "https://releases.hashicorp.com/consul/${CONSUL_VERSION}/consul_${CONSUL_VERSION}_SHA256SUMS"
          grep " ${archive}$" "/tmp/consul_SHA256SUMS" | sed "s# ${archive}# /tmp/${archive}#" | sha256sum -c

          sudo unzip -o "/tmp/${archive}" -d /usr/local/bin
          sudo chmod +x /usr/local/bin/consul

      - name: Build
        run: CGO_ENABLED=0 go build -o build/containerpilot

      - name: Run unit tests
        run: CGO_ENABLED=0 go test -v ./... -bench .

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: |
          git_hash="$(git rev-parse --short HEAD)"
          ldflags="-X github.com/Autopilot-Pattern-Revisited/containerpilot/version.GitHash=${git_hash} -X github.com/Autopilot-Pattern-Revisited/containerpilot/version.Version=dev-build-not-for-release"
          CGO_ENABLED=0 go build -o build/containerpilot -ldflags "${ldflags}"

      - name: Clean integration fixtures
        run: COMPOSE="docker compose" scripts/test.sh clean

      - name: Run integration tests
        run: DEBUG_LOG=integration_tests/debug.log COMPOSE="docker compose" scripts/test.sh test all

      - name: Clean integration fixtures after run
        if: always()
        run: COMPOSE="docker compose" scripts/test.sh clean

      - name: Upload integration debug log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-debug-log
          path: integration_tests/debug.log
          if-no-files-found: ignore
